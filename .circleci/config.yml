# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

restore_bazel_cache: &restore_bazel_cache
  restore_cache:
    keys:
      - v4-bazel-cache-{{ .Environment.CIRCLE_JOB }}-{{ .Branch }}-{{ .Revision }}
      - v4-bazel-cache-{{ .Environment.CIRCLE_JOB }}-{{ .Branch }}
      - v4-bazel-cache-{{ .Environment.CIRCLE_JOB }}-main
save_bazel_cache: &save_bazel_cache
  save_cache:
    # Always saving the cache, even in case of failures, helps with completing
    # jobs where the bazel process was killed because it took too long or OOM.
    # Restart the job if you see the bazel server being terminated abruptly.
    when: always
    key: v4-bazel-cache-{{ .Environment.CIRCLE_JOB }}-{{ .Branch }}-{{ .Revision }}
    paths:
      - /tmp/bazel-cache
      - /tmp/bazel-disk-cache
      - /tmp/zig-cache

clean_bazel_cache: &clean_bazel_cache
  run:
    name: Clean Bazel disk cache of files that have not been modified in 30 days
    # mtime is the only time preserved after untaring the cache.
    command: /usr/bin/find /tmp/bazel-disk-cache -mtime +30 -exec rm -v {} \;

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build-and-test-x86:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: large
    environment:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # setup bazel
      - run: wget https://github.com/bazelbuild/bazel/releases/download/6.3.2/bazel-6.3.2-linux-x86_64
      - run: chmod +x bazel-6.3.2-linux-x86_64
      - run: sudo mv bazel-6.3.2-linux-x86_64 /usr/bin/bazel

      - checkout

      - run:
          name: "Build x86_64"
          command: "bazel build -s //..."
      - run:
          name: "Test"
          command: "bazel test //... --test_output=all"

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_pt_note/infection_result.txt

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_pt_note/infection_result.txt

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_pt_note/infection_result.txt

  build-and-test-aarch64:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: arm.large
    environment:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # setup bazel
      - run: wget https://github.com/bazelbuild/bazel/releases/download/6.3.2/bazel-6.3.2-linux-arm64
      - run: chmod +x bazel-6.3.2-linux-arm64
      - run: sudo mv bazel-6.3.2-linux-arm64 /usr/bin/bazel

      - checkout
     
      - *restore_bazel_cache

      - run:
          name: "Build aarch64"
          command: "bazel build -s //..."
      - run:
          name: "Test"
          command: "bazel test //... --test_output=all"

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_jammy_pt_note/infection_result.txt

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_focal_pt_note/infection_result.txt

      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_text_padding/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_reverse_text/infection_result.txt
      - store_artifacts:
          path: /tmp/bin/infector/infect_ubuntu_bionic_pt_note/infection_result.txt

      - *clean_bazel_cache
      - *save_bazel_cache

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  main-workflow:
    jobs:
      - build-and-test-x86
      - build-and-test-aarch64
